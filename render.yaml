services:
  - type: web
    name: lash-bot-backend
    env: python
    runtime: python3.12
    buildCommand: pip install -r requirements.txt
    startCommand: python start_all.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: DB_PATH
        value: /etc/secrets/db_path
      - key: MINI_APP_URL
        value: https://liquid-glass-calendar-design.vercel.app
